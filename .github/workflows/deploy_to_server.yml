name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload files using SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check SFTP secrets and DNS
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          if [ -z "$SFTP_HOST" ]; then
            echo "ERROR: SFTP_HOST is empty or missing"
            exit 1
          fi

          if [ -z "$SFTP_USER" ]; then
            echo "ERROR: SFTP_USER is empty or missing"
            exit 1
          fi

          if [ -z "$SFTP_PASS" ]; then
            echo "ERROR: SFTP_PASS is empty or missing"
            exit 1
          fi

          if [ -z "$SFTP_REMOTE_DIR" ]; then
            echo "ERROR: SFTP_REMOTE_DIR is empty or missing"
            exit 1
          fi

          echo "SFTP_HOST length: ${#SFTP_HOST}"
          echo "SFTP_REMOTE_DIR length: ${#SFTP_REMOTE_DIR}"

          if echo "$SFTP_HOST" | grep -qE '://|/|:'; then
            echo "ERROR: SFTP_HOST must be hostname or IP only. No protocol, port, or path."
            exit 1
          fi

          getent hosts "$SFTP_HOST" || {
            echo "ERROR: Cannot resolve SFTP_HOST"
            exit 1
          }

          echo "SFTP_HOST resolves successfully"

      - name: Upload files via SFTP
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: 22
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          localDir: ./
          remoteDir: ${{ secrets.SFTP_REMOTE_DIR }}
          forceUpload: true
          removeExtraFilesOnServer: false
          exclude: |
            .git/**
            .github/**
            node_modules/**
            .env
            .DS_Store
